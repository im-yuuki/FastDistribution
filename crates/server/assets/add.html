<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Add File</title>
  <style>
    body { font-family: sans-serif; margin: 24px; }
    label { display: block; margin-top: 12px; }
    input { width: 100%; padding: 8px; }
    .actions { margin-top: 16px; }
  </style>
</head>
<body>
  <a href="/ui">Back to monitor</a>
  <h1>Upload new file</h1>
  <form method="post" action="/ui/add" enctype="multipart/form-data">
    <label>File name<input name="file_name" required /></label>
    <label>File<input name="file" type="file" required /></label>
    <label>Checksum hex (optional)<input name="checksum_hex" /></label>
    <div class="actions">
      <button type="submit">Upload &amp; create torrent</button>
    </div>
  </form>
</body>
</html>
