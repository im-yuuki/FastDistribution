name: Build static binaries

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
#          - os: ubuntu-latest
#            target: aarch64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Build (static)
        shell: bash
        env:
          RUSTFLAGS: ${{ matrix.os == 'windows-latest' && '-C target-feature=+crt-static' || '' }}
        run: |
          cargo build --release -p fast_distribution_server --target ${{ matrix.target }}
          cargo build --release -p fast_distribution_client --target ${{ matrix.target }}

      - name: Package (Unix)
        if: github.event_name == 'release' && matrix.os != 'windows-latest'
        shell: bash
        run: |
          mkdir -p dist
          tar -czf dist/fast_distribution_${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release \
            fast_distribution_server fast_distribution_client

      - name: Package (Windows)
        if: github.event_name == 'release' && matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path @(
            "target/${{ matrix.target }}/release/fast_distribution_server.exe",
            "target/${{ matrix.target }}/release/fast_distribution_client.exe"
          ) -DestinationPath "dist/fast_distribution_${{ matrix.target }}.zip"

      - name: Upload release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: fast_distribution_${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/fast_distribution_server*
            target/${{ matrix.target }}/release/fast_distribution_client*
          if-no-files-found: error
          retention-days: 14
