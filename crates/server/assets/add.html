<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Add File</title>
  <style>
    body { font-family: sans-serif; margin: 24px; }
    label { display: block; margin-top: 12px; }
    input, textarea { width: 100%; padding: 8px; }
    .actions { margin-top: 16px; }
  </style>
</head>
<body>
  <a href="/ui">Back to monitor</a>
  <h1>Add new file</h1>
  <form method="post" action="/ui/add">
    <label>File name<input name="file_name" required /></label>
    <label>Magnet link<textarea name="magnet_link" rows="4" required></textarea></label>
    <label>Total bytes<input name="total_bytes" type="number" min="1" required /></label>
    <label>Checksum hex (optional)<input name="checksum_hex" /></label>
    <div class="actions">
      <button type="submit">Add file</button>
    </div>
  </form>
</body>
</html>
